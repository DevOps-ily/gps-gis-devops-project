version: '3.8'

services:

  db:
    image: postgres:15-alpine
    container_name: gps-gis-postgres
    environment:
      POSTGRES_USER: gps_user
      POSTGRES_PASSWORD: gps_password
      POSTGRES_DB: gps_gis_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - gps-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gps_user -d gps_gis_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: gps-gis-backend
    environment:
      DATABASE_URL: postgresql://gps_user:gps_password@db:5432/gps_gis_db
      ENVIRONMENT: development
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - gps-network
    volumes:
      - ../backend:/app

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: gps-gis-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - gps-network

networks:
  gps-network:
    driver: bridge

volumes:
  postgres_data: