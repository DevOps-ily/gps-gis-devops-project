apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: 521024928143.dkr.ecr.eu-north-1.amazonaws.com/gps-frontend:latest
        imagePullPolicy: Always
        ports:
          - containerPort: 5173
